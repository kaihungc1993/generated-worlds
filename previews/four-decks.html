<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Four Decks — card previews</title>
  <link rel="stylesheet" href="/previews/preview.css" />
  <link rel="stylesheet" href="/previews/cards.css" />
  <style>
    /* dark felt card table */
    #table {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 130% 90% at 50% 118%, rgba(22, 46, 40, 0.85), transparent 62%),
        radial-gradient(ellipse 100% 70% at 50% 112%, rgba(12, 30, 26, 0.9), transparent 70%),
        radial-gradient(circle at 50% 30%, rgba(20, 24, 40, 0.5), transparent 60%),
        #07080c;
    }
    #table::before {
      content: ''; position: absolute; left: 50%; bottom: -46vh;
      width: 165vw; height: 110vh; transform: translateX(-50%);
      border-radius: 50%;
      border: 2px solid rgba(124, 158, 255, 0.18);
      box-shadow:
        0 0 40px rgba(124, 158, 255, 0.12),
        inset 0 0 90px rgba(10, 40, 32, 0.8),
        inset 0 0 300px rgba(6, 22, 18, 0.9);
      background:
        repeating-radial-gradient(circle at 50% 50%, rgba(255,255,255,0.012) 0 3px, transparent 3px 7px),
        radial-gradient(ellipse at 50% 30%, #0f231e, #081410 70%);
    }
    /* deck spots */
    #spots { position: fixed; inset: 0; z-index: 9; }
    .spot { position: absolute; transform: translate(-50%, -50%); text-align: center; cursor: pointer; transition: opacity 0.4s, filter 0.4s, transform 0.5s; }
    .spot .ring {
      width: 196px; height: 264px; margin: 0 auto;
      border-radius: 14px;
      border: 1.5px dashed color-mix(in srgb, var(--accent) 55%, transparent);
      box-shadow: 0 0 26px color-mix(in srgb, var(--accent) 22%, transparent), inset 0 0 30px color-mix(in srgb, var(--accent) 10%, transparent);
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .spot:hover .ring { border-color: var(--accent); box-shadow: 0 0 44px color-mix(in srgb, var(--accent) 45%, transparent), inset 0 0 36px color-mix(in srgb, var(--accent) 18%, transparent); }
    .spot .lbl { margin-top: 14px; font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); text-shadow: 0 0 14px color-mix(in srgb, var(--accent) 70%, transparent); }
    .spot .cnt { margin-top: 3px; font-family: var(--mono); font-size: 9.5px; color: var(--dim); }
    .spot.aside { opacity: 0.28; filter: saturate(0.4); transform: translate(-50%, -50%) scale(0.9); }

    #gather {
      position: fixed; top: 74px; left: 50%; transform: translateX(-50%);
      z-index: 11; font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.1em;
      color: var(--text); background: rgba(12, 14, 20, 0.75);
      border: 1px solid #3a3f52; border-radius: 100px; padding: 9px 20px;
      cursor: pointer; backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s, border-color 0.2s;
    }
    #gather.on { opacity: 1; pointer-events: auto; }
    #gather:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <a class="back" href="/previews/">← previews</a>
  <div class="title">
    <div class="k">Four decks · dealer's table</div>
    <h1>Pick a Deck</h1>
  </div>

  <div id="table"></div>
  <div id="spots"></div>
  <button id="gather">⟲ gather deck</button>
  <div id="stage"></div>
  <div id="fx-dim"></div>
  <div id="deckArea"></div>

  <div id="fx-fill"></div>
  <div id="fx-rays"></div>
  <div id="fx-caption"><div class="k"></div><div class="t"></div><div class="d"></div></div>
  <button id="fx-dismiss">dismiss ✕</button>
  <div id="fx-poster">
    <img src="/play/ghost/promo/title.webp" alt="Ghosts in the Dataset" />
    <div class="banner">
      <div class="k">★ Coming attraction ★</div>
      <div class="t">Ghosts in the Dataset</div>
      <div class="d">A playable cyberpunk arcade world built in Godot 4. This deck opens when the web build ships.</div>
    </div>
  </div>
  <div id="fx-toast"></div>

  <div id="help"><b>click a deck</b> to deal it · <b>click a dealt card</b> to summon / dive · <b>gather</b> sweeps them back</div>
  <div class="loading" id="loading">setting the table…</div>

  <script type="module" src="/previews/four-decks.js"></script>
</body>
</html>
